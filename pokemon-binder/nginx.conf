server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolve upstreams at request time (not startup) so nginx starts even when
    # the backend container isn't in the same network (e.g. on Render).
    # 127.0.0.11 = Docker's internal DNS; 8.8.8.8 = public fallback.
    resolver 127.0.0.11 8.8.8.8 valid=30s ipv6=off;

    # Proxy API, admin, and auth to the Django backend
    location ~ ^/(api|admin|api-auth)/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static assets — long-lived cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React SPA — everything else falls through to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
